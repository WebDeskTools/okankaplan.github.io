<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>New Article - Okan Kaplan Academy</title>

  <meta name="title" content="New Article - Okan Kaplan Academy" />
  <meta name="description" content="Page description content here." />
  <meta name="keywords" content="blog, academy, learning" />
  <meta name="author" content="Okan Kaplan" />
  <meta name="theme-color" content="#0d6efd" />

  <link rel="canonical" href="https://okankaplanedu.github.io/blog/new-article.html" />

  <!-- Fonts (optimized) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      padding-top: 56px;
      background: #f5f5f5;
    }

    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2.5rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .navbar { background: #212529 !important; }

    #offcanvasLeftToggle,
    #offcanvasRightToggle {
      position: fixed;
      top: 10px;
      width: 42px;
      height: 42px;
      z-index: 1080;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #offcanvasLeftToggle { left: 10px; }
    #offcanvasRightToggle { right: 10px; }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .offcanvas { overflow: auto; }
  </style>
</head>

<body>

<!-- LEFT TOGGLE -->
<button class="btn btn-primary shadow" id="offcanvasLeftToggle"
  data-bs-toggle="offcanvas" data-bs-target="#offcanvasLeft"
  aria-label="Open left menu">
  ☰
</button>

<!-- RIGHT TOGGLE -->
<button class="btn btn-success shadow" id="offcanvasRightToggle"
  data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight"
  aria-label="Open right panel">
  <i class="fas fa-comment-dots"></i>
</button>

<!-- NAVBAR -->
<nav class="navbar navbar-dark fixed-top shadow">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/" style="padding-left:45px;">
      Okan Kaplan
    </a>
  </div>
</nav>

<!-- LEFT OFFCANVAS -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasLeft" aria-labelledby="leftMenuLabel">

  <div class="offcanvas-header">
    <h5 class="offcanvas-title fw-bold" id="leftMenuLabel">Menu</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close menu"></button>
  </div>

  <div class="offcanvas-body p-0">
    <iframe
      src="https://okankaplanedu.github.io/archive.html"
      title="Navigation Menu"
      loading="lazy">
    </iframe>
  </div>

</div>

<!-- RIGHT OFFCANVAS -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="rightPanelTitle">

  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title fw-bold" id="rightPanelTitle">Panel</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close panel"></button>
  </div>

  <div class="offcanvas-body" id="right-panel-content">
    <div class="text-center p-3">
      <div class="spinner-border text-success"></div>
      <p class="small mt-2">Loading...</p>
    </div>
  </div>

</div>

<!-- CONTENT -->
<div class="container">
  <main>
    <article>
      <h1 class="fw-bold mb-4">New Article</h1>

      <div id="article-body">
        <h2>Hello World</h2>
        <p>Content editor is ready. Modern DevOps ve SEO odaklı sistemler için yapılandırılmıştır.</p>
      </div>

    </article>
  </main>
</div>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* Footer */
fetch('https://raw.githubusercontent.com/bandanee/root/main/import/footer.html')
  .then(r => r.text())
  .then(h => document.getElementById('footer-placeholder').innerHTML = h);

/* Right panel (TOC) */
const rightPanelUrl = 'https://raw.githubusercontent.com/bandanee/root/main/import/toc.html';

document.getElementById('offcanvasRight').addEventListener('show.bs.offcanvas', async () => {
  const el = document.getElementById('right-panel-content');

  try {
    const res = await fetch(rightPanelUrl);
    if (!res.ok) throw new Error();

    el.innerHTML = await res.text();
    document.getElementById('rightPanelTitle').textContent = 'Table of Contents';

  } catch (e) {
    el.innerHTML = '<div class="alert alert-warning small">Content failed to load.</div>';
  }
});

/* Service Worker */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .catch(console.error);
}
</script>

</body>
</html>
