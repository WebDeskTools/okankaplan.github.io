<script>

/* ========================================================= */
/* CONFIG */
/* ========================================================= */

const CONFIG = {

    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    branch: "main",

    baseFolder: "categories",

    cacheKey: "ok_academy_cache",
    cacheTime: 3600000,

    fetchDelay: 100

};

/* ========================================================= */
/* STATE */
/* ========================================================= */

let masonryInstance = null;
let tempArchive = [];

/* ========================================================= */
/* CACHE */
/* ========================================================= */

const Cache = {

    get(){

        try{

            const data =
                localStorage.getItem(CONFIG.cacheKey);

            if(!data) return null;

            const parsed = JSON.parse(data);

            if(Date.now() - parsed.timestamp > CONFIG.cacheTime){
                return null;
            }

            return parsed.articles;

        }catch(e){

            return null;

        }

    },

    set(articles){

        localStorage.setItem(
            CONFIG.cacheKey,
            JSON.stringify({
                timestamp: Date.now(),
                articles
            })
        );

    }

};

/* ========================================================= */
/* STATUS */
/* ========================================================= */

function updateStatus(message){

    const el =
        document.getElementById("status-message");

    if(el){

        el.textContent = message;

    }

}

/* ========================================================= */
/* CARD */
/* ========================================================= */

function renderCard(article){

    const wrapper =
        document.createElement("div");

    wrapper.className = "grid-item";

    wrapper.innerHTML = `
        <div class="card-custom">
            <article>
                ${article.content}
            </article>

            <a href="${article.url}"
               target="_top"
               class="btn-open">

               Detayları Gör →

            </a>
        </div>
    `;

    document
        .getElementById("masonry-container")
        .appendChild(wrapper);

}

/* ========================================================= */
/* SCAN */
/* ========================================================= */

async function scan(path){

    try{

        const response = await fetch(
            `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`
        );

        if(!response.ok) return;

        const items = await response.json();

        for(const item of items){

            if(item.type === "dir"){

                await scan(item.path);

            }

            else if(
                item.name === "index.html" &&
                path !== CONFIG.baseFolder
            ){

                updateStatus(
                    `Taranıyor: ${item.path}`
                );

                const htmlResponse =
                    await fetch(
                        `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`
                    );

                if(htmlResponse.ok){

                    const html =
                        await htmlResponse.text();

                    const doc =
                        new DOMParser()
                        .parseFromString(html,"text/html");

                    const article =
                        doc.querySelector("main article");

                    if(article){

                        const data = {

                            url:
                            `https://${CONFIG.repo}/${item.path.replace("index.html","")}`,

                            content:
                            article.innerHTML

                        };

                        tempArchive.push(data);

                        renderCard(data);

                    }

                }

                await new Promise(
                    r => setTimeout(r, CONFIG.fetchDelay)
                );

            }

        }

    }catch(err){

        console.error(err);

    }

}

/* ========================================================= */
/* FINALIZE */
/* ========================================================= */

function finalize(cache = false){

    const spinner =
        document.getElementById("status-spinner");

    if(spinner){

        spinner.remove();

    }

    document.getElementById("status-message")
    .innerHTML = `
        <span style="color:#10b981">●</span>
        ${cache ? 'Hızlı Önbellek Aktif' : 'Arşiv Güncellendi'}
    `;

}

/* ========================================================= */
/* START */
/* ========================================================= */

async function start(){

    const cached = Cache.get();

    if(cached){

        updateStatus("Önbellek yükleniyor...");

        cached.forEach(renderCard);

        finalize(true);

    }

    else{

        updateStatus("Arşiv taranıyor...");

        await scan(CONFIG.baseFolder);

        if(tempArchive.length){

            Cache.set(tempArchive);

        }

        finalize(false);

    }

}

/* ========================================================= */
/* LOAD */
/* ========================================================= */

window.addEventListener("DOMContentLoaded", start);

/* ========================================================= */
/* LAZY FETCH */
/* ========================================================= */

window.addEventListener("load", () => {

    fetch(
        'https://raw.githubusercontent.com/bandanee/root/main/import/footer.html'
    )
    .then(r => r.text())
    .then(html => {

        document
        .getElementById('footer-placeholder')
        .innerHTML = html;

    });

});

/* ========================================================= */
/* RIGHT PANEL */
/* ========================================================= */

document
.getElementById('offcanvasRight')
.addEventListener('show.bs.offcanvas', () => {

    if(
        document
        .getElementById('toc-placeholder')
        .innerHTML
        .trim()
    ) return;

    fetch(
        'https://raw.githubusercontent.com/bandanee/root/main/import/toc.html'
    )
    .then(r => r.text())
    .then(html => {

        document
        .getElementById('toc-placeholder')
        .innerHTML = html;

    });

});

/* ========================================================= */
/* SERVICE WORKER */
/* ========================================================= */

if('serviceWorker' in navigator){

    window.addEventListener('load', () => {

        navigator
        .serviceWorker
        .register('/sw.js')
        .catch(console.error);

    });

}

</script>
