<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DailyMind – Optimized Smart Archive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #0ea5e9; 
            --bg: #ffffff; 
            --border: #f1f5f9; 
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex;
            justify-content: center;
        }

        .archive-card { 
            background: var(--bg); 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            border-radius: 12px; 
            padding: 12px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden; 
        }

        #status-bar { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            min-height: 20px;
        }

        /* Search Box styling */
        .dataTables_filter { margin-bottom: 10px !important; width: 100%; }
        .dataTables_filter input {
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            padding: 6px 10px !important;
            font-size: 12px !important;
            width: 100% !important;
            margin-left: 0 !important;
            outline: none;
        }

        /* Table Constraint */
        table.dataTable { 
            width: 100% !important; 
            border-collapse: collapse !important;
            margin: 0 !important;
            table-layout: fixed; 
        }

        table.dataTable thead th { 
            font-size: 10px; 
            text-transform: uppercase; 
            background: #f8fafc !important; 
            padding: 8px !important; 
            color: var(--text-muted);
            border-bottom: 2px solid var(--border) !important;
        }

        table.dataTable tbody td { 
            font-size: 12px; 
            padding: 8px 4px !important; 
            vertical-align: top; 
            border-bottom: 1px solid var(--border) !important;
        }

        /* 50px Height Scrollable Cells */
        .scroll-box { 
            height: 50px; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            line-height: 1.4;
            word-break: break-word;
            padding-right: 4px;
        }

        .scroll-box::-webkit-scrollbar { width: 3px; }
        .scroll-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .go-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent); 
            color: #fff !important; 
            text-decoration: none !important; 
            font-size: 10px; 
            font-weight: 600; 
            width: 100%;
            height: 32px;
            border-radius: 6px; 
        }

        /* Column ratios for 400px */
        .col-link { width: 50px; }
        .col-title { width: 135px; }
        .col-desc { width: auto; }

        @media screen and (max-width: 380px) {
            .mobile-hide { display: none !important; }
        }
    </style>
</head>
<body>

<div class="archive-card">
    <div id="status-bar">
        <div id="spinner" class="spinner-border spinner-border-sm text-info" role="status" style="width:10px; height:10px; display:none;"></div>
        <span id="status-msg" style="margin-left:5px">Ready</span>
    </div>

    <table id="archiveTable" class="display" style="width:100%; display:none;">
      <thead>
        <tr>
          <th class="col-link">Link</th>
          <th class="col-title">Title</th>
          <th class="col-desc mobile-hide">Description</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>

/** * DailyMind – Auto-Session Logic * Prevents redundant API calls by locking sync to once per session. */
const CONFIG = {
    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    baseFolder: "categories",
    branch: "main",
    cacheKey: "dailymind_persistent_storage",
    sessionKey: "dailymind_already_synced",
    delay: 150
};

// --- GÜVENLİK VE IFRAME KONTROLÜ (YENİ EKLENEN KISIM) ---
function checkIframeSecurity() {
    const targetDomain = "https://okankaplanedu.github.io";
    
    // 1. Sayfa bir iframe içinde mi açılmış?
    const isInIframe = (window.self !== window.top);

    if (!isInIframe) {
        // Doğrudan açılmak istenirse ana siteye yönlendir
        window.location.replace(targetDomain);
        return false;
    }

    try {
        // 2. Iframe içinde ama üst pencerenin (parent) adresi bizim domain mi?
        // Tarayıcı güvenlik politikaları (CORS) nedeniyle farklı domain ise burası hata fırlatır (catch'e düşer)
        if (!window.parent.location.href.startsWith(targetDomain)) {
            window.top.location.replace(targetDomain);
            return false;
        }
    } catch (e) {
        // Farklı bir domain altında iframe olarak çağrıldıysa CORS hatası alacaktır.
        // Bu durumda da kullanıcının üst penceresini ana siteye yönlendiriyoruz.
        try {
            window.top.location.replace(targetDomain);
        } catch(err) {
            // Eğer top.location'a müdahale engellenirse alternatif yönlendirme
            window.location.replace(targetDomain);
        }
        return false;
    }
    return true;
}
// -----------------------------------------------------

let archiveData = [];
const escapeHTML = (s) => s ? s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])) : "-";

// UI ve diğer fonksiyonlar aynen kalıyor...
const UI = { /* ... mevcut kodlarınız ... */ };
async function scan(path) { /* ... mevcut kodlarınız ... */ }
async function processFile(path) { /* ... mevcut kodlarınız ... */ }
function addRow(item) { /* ... mevcut kodlarınız ... */ }
function initTable() { /* ... mevcut kodlarınız ... */ }

async function startEngine() {
    // Önce iframe ve domain kontrolünü yap, geçemezse motoru hiç çalıştırma
    if (!checkIframeSecurity()) return;

    const isSessionActive = sessionStorage.getItem(CONFIG.sessionKey);
    const localCache = localStorage.getItem(CONFIG.cacheKey);

    if (isSessionActive && localCache) {
        const data = JSON.parse(localCache);
        data.forEach(addRow);
        initTable();
        UI.finalize("Ready (Cached Mode)");
    } else {
        UI.update("System initializing (Session Sync)...");
        await scan(CONFIG.baseFolder);
                
        if (archiveData.length > 0) {
            localStorage.setItem(CONFIG.cacheKey, JSON.stringify(archiveData));
            sessionStorage.setItem(CONFIG.sessionKey, "true");
            initTable();
            UI.finalize("System Synchronized");
        } else {
            UI.update("Sync failed or archive empty.", false);
        }
    }
}

$(document).ready(startEngine);
</script> 

</body>
</html>
