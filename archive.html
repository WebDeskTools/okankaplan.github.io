<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DailyMind – Smart Search Archive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #0ea5e9; 
            --bg: #ffffff; 
            --border: #f1f5f9; 
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex;
            justify-content: center;
        }

        .archive-card { 
            background: var(--bg); 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            border-radius: 12px; 
            padding: 12px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden; 
        }

        #status-bar { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            min-height: 20px;
        }

        /* Search Box Overrides */
        .dataTables_filter { margin-bottom: 10px !important; width: 100%; }
        .dataTables_filter input {
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            padding: 6px 10px !important;
            font-size: 12px !important;
            width: 100% !important;
            margin-left: 0 !important;
            outline: none;
        }

        /* Table Architecture */
        table.dataTable { 
            width: 100% !important; 
            border-collapse: collapse !important;
            margin: 0 !important;
            table-layout: fixed; /* Prevents stretching */
        }

        table.dataTable thead th { 
            font-size: 10px; 
            text-transform: uppercase; 
            background: #f8fafc !important; 
            padding: 8px !important; 
            color: var(--text-muted);
            border-bottom: 2px solid var(--border) !important;
        }

        table.dataTable tbody td { 
            font-size: 12px; 
            padding: 8px 4px !important; 
            vertical-align: top; 
            border-bottom: 1px solid var(--border) !important;
        }

        /* Fixed Height Cells with Scroll */
        .scroll-cell { 
            height: 50px; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            line-height: 1.4;
            word-break: break-word;
            padding-right: 4px;
        }

        .scroll-cell::-webkit-scrollbar { width: 3px; }
        .scroll-cell::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .go-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent); 
            color: #fff !important; 
            text-decoration: none !important; 
            font-size: 10px; 
            font-weight: 600; 
            width: 100%;
            height: 32px;
            border-radius: 6px; 
            transition: transform 0.1s ease;
        }

        .go-btn:active { transform: scale(0.95); }

        .refresh-link { 
            font-size: 10px; 
            background: none;
            border: 1px solid #e2e8f0;
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* Column Widths */
        .w-link { width: 50px; }
        .w-title { width: 135px; }
        .w-desc { width: auto; }

        @media screen and (max-width: 380px) {
            .mobile-hide { display: none !important; }
        }
    </style>
</head>
<body>

<div class="archive-card">
    <div id="status-bar">
        <div id="status-container">
            <div id="spinner" class="spinner-border spinner-border-sm text-info" role="status" style="width:10px; height:10px;"></div>
            <span id="status-msg" style="margin-left:5px">Initializing...</span>
        </div>
    </div>

    <table id="archiveTable" class="display" style="width:100%; display:none;">
      <thead>
        <tr>
          <th class="w-link">Link</th>
          <th class="w-title">Title</th>
          <th class="w-desc mobile-hide">Description</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
/**
 * DailyMind – Final English Version
 * One-time fetch logic with persistence
 */
const CONFIG = {
    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    baseFolder: "categories",
    branch: "main",
    cacheKey: "dailymind_v_final",
    cacheTime: 3600000, // 1 Hour
    delay: 150
};

let archiveData = [];

const escapeHTML = (str) => {
    if (!str) return "-";
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
};

const UI = {
    update: (msg, showSpinner = true) => {
        document.getElementById("status-msg").innerText = msg;
        document.getElementById("spinner").style.display = showSpinner ? "inline-block" : "none";
    },
    finalize: (msg) => {
        document.getElementById("status-bar").innerHTML = `
            <span><span style="color:#10b981">●</span> ${msg}</span>
            <button class="refresh-link" onclick="Storage.clear()">Force Refresh</button>
        `;
    }
};

const Storage = {
    get: () => {
        const item = localStorage.getItem(CONFIG.cacheKey);
        if (!item) return null;
        const parsed = JSON.parse(item);
        if (Date.now() - parsed.timestamp > CONFIG.cacheTime) return null;
        return parsed.data;
    },
    set: (data) => {
        localStorage.setItem(CONFIG.cacheKey, JSON.stringify({
            timestamp: Date.now(),
            data: data
        }));
    },
    clear: () => {
        localStorage.removeItem(CONFIG.cacheKey);
        location.reload();
    }
};

async function scan(path) {
    try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
        if (!response.ok) return;
        const items = await response.json();

        for (const item of items) {
            await new Promise(r => setTimeout(r, CONFIG.delay));
            if (item.type === "dir") {
                await scan(item.path);
            } else if (item.name === "index.html") {
                UI.update(`Indexing: ${item.path.split('/').slice(-2, -1)}`);
                await process(item.path);
            }
        }
    } catch (e) { console.error("Fetch error", e); }
}

async function process(path) {
    try {
        const res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${path}`);
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        
        const entry = {
            url: `https://${CONFIG.owner}.github.io/${path.replace('index.html', '')}`,
            title: doc.querySelector("title")?.innerText || "Untitled",
            desc: doc.querySelector('meta[name="description"]')?.content || "No description available."
        };
        archiveData.push(entry);
        renderRow(entry);
    } catch (e) { console.error("Process error", e); }
}

function renderRow(item) {
    const html = `
        <tr>
            <td><a href="${item.url}" target="_top" class="go-btn">GO</a></td>
            <td><div class="scroll-cell"><strong>${escapeHTML(item.title)}</strong></div></td>
            <td class="mobile-hide"><div class="scroll-cell">${escapeHTML(item.desc)}</div></td>
        </tr>`;
    document.getElementById("tableBody").insertAdjacentHTML('beforeend', html);
}

function initDataTable() {
    $("#archiveTable").show();
    $('#archiveTable').DataTable({
        pageLength: 10,
        autoWidth: false,
        order: [[1, 'asc']],
        dom: '<"mb-2"f>rtip',
        language: {
            search: "",
            searchPlaceholder: "Search archive...",
            info: "_TOTAL_ entries",
            paginate: { previous: "«", next: "»" }
        }
    });
}

async function start() {
    const cached = Storage.get();

    if (cached) {
        UI.update("Loading from local storage...");
        cached.forEach(renderRow);
        initDataTable();
        UI.finalize("Archive Ready (Cached)");
    } else {
        UI.update("First time sync... Please wait.");
        await scan(CONFIG.baseFolder);
        if (archiveData.length > 0) {
            Storage.set(archiveData);
            initDataTable();
            UI.finalize("Archive Updated");
        } else {
            UI.update("No records found.", false);
        }
    }
}

$(document).ready(start);
</script> 

</body>
</html>
