<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DailyMind – Optimized Smart Archive</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #0ea5e9; 
            --bg: #ffffff; 
            --border: #f1f5f9; 
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex;
            justify-content: center;
        }

        .archive-card { 
            background: var(--bg); 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            border-radius: 12px; 
            padding: 12px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden; 
        }

        #status-bar { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            min-height: 20px;
        }

        /* Search Box styling */
        .dataTables_filter { margin-bottom: 10px !important; width: 100%; }
        .dataTables_filter input {
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            padding: 6px 10px !important;
            font-size: 12px !important;
            width: 100% !important;
            margin-left: 0 !important;
            outline: none;
        }

        /* Table Constraint */
        table.dataTable { 
            width: 100% !important; 
            border-collapse: collapse !important;
            margin: 0 !important;
            table-layout: fixed; 
        }

        table.dataTable thead th { 
            font-size: 10px; 
            text-transform: uppercase; 
            background: #f8fafc !important; 
            padding: 8px !important; 
            color: var(--text-muted);
            border-bottom: 2px solid var(--border) !important;
        }

        table.dataTable tbody td { 
            font-size: 12px; 
            padding: 8px 4px !important; 
            vertical-align: top; 
            border-bottom: 1px solid var(--border) !important;
        }

        /* 50px Height Scrollable Cells */
        .scroll-box { 
            height: 50px; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            line-height: 1.4;
            word-break: break-word;
            padding-right: 4px;
        }

        .scroll-box::-webkit-scrollbar { width: 3px; }
        .scroll-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .go-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent); 
            color: #fff !important; 
            text-decoration: none !important; 
            font-size: 10px; 
            font-weight: 600; 
            width: 100%;
            height: 32px;
            border-radius: 6px; 
        }

        /* Column ratios for 400px */
        .col-link { width: 50px; }
        .col-title { width: 135px; }
        .col-desc { width: auto; }

        @media screen and (max-width: 380px) {
            .mobile-hide { display: none !important; }
        }
    </style>
</head>
<body>

<div class="archive-card">
    <div id="status-bar">
        <div id="spinner" class="spinner-border spinner-border-sm text-info" role="status" style="width:10px; height:10px; display:none;"></div>
        <span id="status-msg" style="margin-left:5px">Ready</span>
    </div>

    <table id="archiveTable" class="display" style="width:100%; display:none;">
      <thead>
        <tr>
          <th class="col-link">Link</th>
          <th class="col-title">Title</th>
          <th class="col-desc mobile-hide">Description</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
/**
 * DailyMind – Auto-Session Logic
 * Prevents redundant API calls by locking sync to once per session.
 */
const CONFIG = {
    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    baseFolder: "categories",
    branch: "main",
    cacheKey: "dailymind_persistent_storage",
    sessionKey: "dailymind_already_synced",
    delay: 150
};

let archiveData = [];

const escapeHTML = (s) => s ? s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])) : "-";

const UI = {
    update: (msg, loading = true) => {
        document.getElementById("status-msg").innerText = msg;
        document.getElementById("spinner").style.display = loading ? "inline-block" : "none";
    },
    finalize: (msg) => {
        document.getElementById("status-bar").innerHTML = `<span><span style="color:#10b981">●</span> ${msg}</span>`;
    }
};

async function scan(path) {
    try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
        if (!response.ok) return;
        const items = await response.json();

        for (const item of items) {
            await new Promise(r => setTimeout(r, CONFIG.delay));
            if (item.type === "dir") {
                await scan(item.path);
            } else if (item.name === "index.html") {
                UI.update(`Syncing: ${item.path.split('/').slice(-2, -1)}`);
                await processFile(item.path);
            }
        }
    } catch (e) { console.error("Sync interrupted", e); }
}

async function processFile(path) {
    try {
        const res = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${path}`);
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        
        const entry = {
            url: `https://${CONFIG.owner}.github.io/${path.replace('index.html', '')}`,
            title: doc.querySelector("title")?.innerText || "Untitled",
            desc: doc.querySelector('meta[name="description"]')?.content || "No description."
        };
        archiveData.push(entry);
        addRow(entry);
    } catch (e) { console.error("Parsing error", e); }
}

function addRow(item) {
    const html = `
        <tr>
            <td><a href="${item.url}" target="_top" class="go-btn">GO</a></td>
            <td><div class="scroll-box"><strong>${escapeHTML(item.title)}</strong></div></td>
            <td class="mobile-hide"><div class="scroll-box">${escapeHTML(item.desc)}</div></td>
        </tr>`;
    document.getElementById("tableBody").insertAdjacentHTML('beforeend', html);
}

function initTable() {
    $("#archiveTable").show();
    $('#archiveTable').DataTable({
        pageLength: 10,
        autoWidth: false,
        order: [[1, 'asc']],
        dom: '<"mb-2"f>rtip',
        language: {
            search: "",
            searchPlaceholder: "Instant search...",
            info: "_TOTAL_ entries",
            paginate: { previous: "«", next: "»" }
        }
    });
}

async function startEngine() {
    const isSessionActive = sessionStorage.getItem(CONFIG.sessionKey);
    const localCache = localStorage.getItem(CONFIG.cacheKey);

    if (isSessionActive && localCache) {
        // Session exists: Trigger search from cache only
        const data = JSON.parse(localCache);
        data.forEach(addRow);
        initTable();
        UI.finalize("Ready (Cached Mode)");
    } else {
        // New Session: Auto-trigger ONE refresh to update cache
        UI.update("System initializing (Session Sync)...");
        await scan(CONFIG.baseFolder);
        
        if (archiveData.length > 0) {
            localStorage.setItem(CONFIG.cacheKey, JSON.stringify(archiveData));
            sessionStorage.setItem(CONFIG.sessionKey, "true"); // Lock sync for this session
            initTable();
            UI.finalize("System Synchronized");
        } else {
            UI.update("Sync failed or archive empty.", false);
        }
    }
}

$(document).ready(startEngine);
</script> 

</body>
</html>
