<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>
/* CONFIGURATION */
const CONFIG = {
    owner: "webdesktools",
    repo: "webdesktools.github.io",
    branch: "main",
    baseFolder: "categories",
    cacheKey: "ok_academy_cache",
    cacheTime: 3600000, // 1 Saat (ms)
    fetchDelay: 150
};

let masonryGrid;
let tempArchive = []; // API'den çekilenleri geçici tutar

/* INITIALIZE MASONRY */
function initMasonry() {
    masonryGrid = $('#masonry-container').masonry({
        itemSelector: '.grid-item',
        percentPosition: true,
        transitionDuration: '0.4s'
    });
}

/* CACHE CONTROLS */
const Cache = {
    get: () => {
        const data = localStorage.getItem(CONFIG.cacheKey);
        if (!data) return null;
        const parsed = JSON.parse(data);
        if (Date.now() - parsed.timestamp > CONFIG.cacheTime) return null;
        return parsed.articles;
    },
    set: (articles) => {
        const obj = { timestamp: Date.now(), articles: articles };
        localStorage.setItem(CONFIG.cacheKey, JSON.stringify(obj));
    }
};

/* RENDER ENGINE */
function renderCard(article, isAppended = true) {
    const cardHTML = `
        <div class="grid-item">
            <div class="card-custom">
                <article>${article.content}</article>
                <a href="${article.url}" target="_top" class="btn-open">Detayları Gör →</a>
            </div>
        </div>`;
    
    const $item = $(cardHTML);
    $('#masonry-container').append($item);
    
    $item.imagesLoaded(() => {
        masonryGrid.masonry('appended', $item).masonry('layout');
    });
}

/* API SCANNER */
async function scanAndCache(path) {
    try {
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
        if (!res.ok) return;
        const items = await res.json();

        for (const item of items) {
            if (item.type === "dir") {
                await scanAndCache(item.path);
            } else if (item.name === "index.html" && path !== CONFIG.baseFolder) {
                updateUIStatus(`Taranıyor: ${item.path.split('/').slice(-2,-1)}`);
                const contentRes = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`);
                if (contentRes.ok) {
                    const html = await contentRes.text();
                    const doc = new DOMParser().parseFromString(html, "text/html");
                    const article = doc.querySelector("main article");
                    if (article) {
                        const data = {
                            url: `https://${CONFIG.repo}/${item.path.replace('index.html','')}`,
                            content: article.innerHTML
                        };
                        tempArchive.push(data);
                        renderCard(data);
                    }
                }
                await new Promise(r => setTimeout(r, CONFIG.fetchDelay));
            }
        }
    } catch (e) { console.error("Scan Error:", e); }
}

function updateUIStatus(msg, color = "#0d6efd") {
    const txt = document.getElementById("status-message");
    if(txt) { txt.innerText = msg; txt.style.color = color; }
}

function finalizeUI(isCache = false) {
    const spinner = document.getElementById("status-spinner");
    if (spinner) spinner.style.display = "none";
    const status = document.getElementById("status");
    status.innerHTML = `
        <span style="color:#10b981">●</span> 
        <span style="font-size:13px; font-weight:600;">${isCache ? 'Hızlı Yükleme Aktif' : 'Arşiv Güncellendi'}</span>
        <button class="btn btn-sm btn-outline-secondary ms-2" onclick="localStorage.removeItem('${CONFIG.cacheKey}'); location.reload();" style="font-size:10px; border-radius:20px;">Yenile</button>
    `;
}

/* START APP */
async function startApp() {
    initMasonry();
    const cachedArticles = Cache.get();

    if (cachedArticles) {
        updateUIStatus("Önbellek yükleniyor...");
        cachedArticles.forEach(art => renderCard(art));
        finalizeUI(true);
    } else {
        updateUIStatus("Arşiv taranıyor (Bu işlem bir kez yapılır)...");
        await scanAndCache(CONFIG.baseFolder);
        if (tempArchive.length > 0) Cache.set(tempArchive);
        finalizeUI(false);
    }
}

$(document).ready(startApp);

// Footer & TOC Fetch
fetch('https://raw.githubusercontent.com/bandanee/root/main/import/toc.html').then(r => r.text()).then(h => document.getElementById('toc-placeholder').innerHTML = h);
fetch('https://raw.githubusercontent.com/bandanee/root/main/import/footer.html').then(r => r.text()).then(h => document.getElementById('footer-placeholder').innerHTML = h);

</script>
