<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>
/* CONFIGURATION */
const CONFIG = {
    owner: "webdesktools",
    repo: "webdesktools.github.io",
    branch: "main",
    baseFolder: "categories",
    fetchDelay: 180, // Her makale çekimi arasındaki bekleme (ms)
    scanDelay: 100   // Klasör tarama hızı (ms)
};

let masonryGrid;
const sleep = ms => new Promise(res => setTimeout(res, ms));

/* MASONRY INITIALIZATION */
function initMasonry(){
    masonryGrid = $('#masonry-container').masonry({
        itemSelector: '.grid-item',
        columnWidth: '.grid-sizer',
        gutter: '.gutter-sizer',
        percentPosition: true,
        transitionDuration: '0.4s'
    });
}

/* RECURSIVE DIRECTORY SCAN */
async function scan(path){
    try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
        
        if (response.status === 403) {
            updateUIStatus("GitHub API Limiti (403). Lütfen biraz bekleyin.", "#ef4444");
            return;
        }

        if(!response.ok) return;

        const items = await response.json();
        items.reverse();

        for(const item of items){
            await sleep(CONFIG.scanDelay);

            if(item.type === "dir"){
                await scan(item.path);
            }
            else if(item.type === "file" && item.name === "index.html" && path !== CONFIG.baseFolder){
                updateUIStatus(`Yükleniyor: ${item.path.split('/').slice(-2, -1)}`);
                await fetchAndRender(item.path);
                await sleep(CONFIG.fetchDelay); // Stabilite gecikmesi
            }
        }
    } catch(error) {
        console.error("Scan Error:", error);
    }
}

/* FETCH AND MASONRY RENDER */
async function fetchAndRender(filePath){
    try {
        const response = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${filePath}`);
        if(!response.ok) return;

        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        const articleElement = doc.querySelector("main article");

        if(!articleElement) return;

        const articleContent = articleElement.innerHTML;
        const pageURL = `https://${CONFIG.repo}/${filePath.replace('index.html','')}`;

        const cardHTML = `
            <div class="grid-item mb-3">
                <div class="card-custom">
                    <article>${articleContent}</article>
                    <a href="${pageURL}" target="_top" class="btn-open">Detayları Gör →</a>
                </div>
            </div>`;

        const $items = $(cardHTML);
        $('#masonry-container').prepend($items);

        $items.imagesLoaded(function(){
            if(masonryGrid) {
                masonryGrid.masonry('prepended', $items).masonry('layout');
            }
        });

    } catch(error) {
        console.error("Render Error:", error);
    }
}

function updateUIStatus(msg, color = "#94a3b8") {
    const statusText = document.getElementById("status-message");
    if(statusText) {
        statusText.innerText = msg;
        statusText.style.color = color;
    }
}

/* STARTUP */
async function startApp(){
    initMasonry();
    await scan(CONFIG.baseFolder);
    
    const spinner = document.getElementById("status-spinner");
    if(spinner) spinner.style.display = "none";
    
    document.getElementById("status").innerHTML = `
        <span style="color:#10b981; font-weight:bold;">●</span>
        <span style="font-weight:500; color:#1e293b;">Arşiv başarıyla senkronize edildi</span>`;

    if(masonryGrid) masonryGrid.masonry('layout');
}

$(document).ready(startApp);

/* RESIZE HANDLER */
window.addEventListener('resize',()=>{
    clearTimeout(window.__masonryResize);
    window.__masonryResize = setTimeout(()=>{
        if(masonryGrid) masonryGrid.masonry('layout');
    },250);
});

/* PWA SERVICE WORKER */
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(err => console.error("SW Error:", err));
}
</script>
