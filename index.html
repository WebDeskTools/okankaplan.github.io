<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>
const CONFIG = {
    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    branch: "main",
    baseFolder: "categories",
   cacheKey: "ok_academy_cache_v24",
    cacheTime: 3600000, 
    fetchDelay: 150
};

let masonryGrid;
let tempArchive = [];

function initMasonry() {
    masonryGrid = $('#masonry-container').masonry({
        itemSelector: '.grid-item',
        columnWidth: '.grid-sizer',
        percentPosition: true,
        transitionDuration: '0.3s'
    });
}

const Cache = {
    get: () => {
        const data = localStorage.getItem(CONFIG.cacheKey);
        if (!data) return null;
        const parsed = JSON.parse(data);
        if (Date.now() - parsed.timestamp > CONFIG.cacheTime) return null;
        return parsed.articles;
    },
    set: (articles) => {
        const obj = { timestamp: Date.now(), articles: articles };
        localStorage.setItem(CONFIG.cacheKey, JSON.stringify(obj));
    }
};

function renderCard(article) {

    const plainText = `
        ${article.title}
        ${article.description}
        ${article.keywords}
    `.toLowerCase();



    const imageHTML = article.image
        ? `<img src="${article.image}" 
                loading="lazy"
                class="card-cover">`
        : "";



    const cardHTML = `

    <div class="grid-item" data-search="${plainText}">

        <div class="card-custom">

           

            <div class="card-body-custom">

                <h2 class="card-title-custom">
                    ${article.title}
                </h2>

                <p class="card-desc-custom">
                    ${article.description}
                </p>

                <div class="card-keywords-custom">
                    ${article.keywords}
                </div>

                <a href="${article.url}"
                   class="btn-open"
                   target="_top">

                   View Details →

                </a>

            </div>

        </div>

    </div>`;



    const $item = $(cardHTML);

    $('#masonry-container').append($item);



    $item.imagesLoaded(() => {

        if(masonryGrid) {

            masonryGrid
                .masonry('appended', $item)
                .masonry('layout');
        }
    });
}

 
$('#search-input').on('keyup', function() {
    const val = $(this).val().toLowerCase();
    
    $('.grid-item').each(function() {
        const text = $(this).data('search');
        if (text.indexOf(val) > -1) {
            $(this).removeClass('is-hidden');
        } else {
            $(this).addClass('is-hidden');
        }
    });

 
    masonryGrid.masonry('layout');
});

async function scanAndCache(path) {
    try {
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
        if (!res.ok) return;
        const items = await res.json();

for (const item of items) {

    if (item.type === "dir") {

        await scanAndCache(item.path);

    } else if (
        item.name === "index.html" &&
        path !== CONFIG.baseFolder
    ) {

        updateUIStatus(
            `Taranıyor: ${
                item.path.split('/').slice(-2,-1)
            }`
        );

        const contentRes = await fetch(
            `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`
        );

        if (contentRes.ok) {

            const html = await contentRes.text();

            const doc = new DOMParser()
                .parseFromString(html, "text/html");

 
            const title =
                doc.querySelector("title")
                ?.innerText
                ?.trim() || "Untitled";

            const description =
                doc.querySelector(
                    'meta[name="description"]'
                )
                ?.getAttribute("content")
                ?.trim() || "";

            const keywords =
                doc.querySelector(
                    'meta[name="keywords"]'
                )
                ?.getAttribute("content")
                ?.trim() || "";



            // İSTEĞE BAĞLI OG IMAGE
            const image =
                doc.querySelector(
                    'meta[property="og:image"]'
                )
                ?.getAttribute("content")
                ?.trim() || "";



            const data = {

                url:
                    `https://${CONFIG.repo}/${
                        item.path.replace(
                            'index.html',
                            ''
                        )
                    }`,

                title,
                description,
                keywords,
                image

            };



            tempArchive.push(data);

            renderCard(data);

        }

        await new Promise(
            r => setTimeout(r, CONFIG.fetchDelay)
        );
    }
}
    } catch (e) { console.error("Tarama Hatası:", e); }
}

function updateUIStatus(msg) {
    const txt = document.getElementById("status-message");
    if(txt) txt.innerText = msg;
}

function finalizeUI(isCache = false) {
    const spinner = document.getElementById("status-spinner");
    if (spinner) spinner.style.display = "none";
    const status = document.getElementById("status");
    status.innerHTML = `<span style="color:#10b981">●</span> <span style="font-size:13px; font-weight:600;">${isCache ? 'Hızlı Yükleme' : 'Arşiv Güncel'}</span>`;
    setTimeout(() => $('#status-container').fadeOut(), 3000);
}

async function startApp() {
    initMasonry();
    const cachedArticles = Cache.get();

    if (cachedArticles) {
        cachedArticles.forEach(art => renderCard(art));
        finalizeUI(true);
    } else {
        await scanAndCache(CONFIG.baseFolder);
        if (tempArchive.length > 0) Cache.set(tempArchive);
        finalizeUI(false);
    }
}

$(document).ready(startApp);

 

fetch('https://raw.githubusercontent.com/bandanee/root/main/import/footer.html').then(r => r.text()).then(h => document.getElementById('footer-placeholder').innerHTML = h);

</script>
</body>
