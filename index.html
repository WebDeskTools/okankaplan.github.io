<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

<script>
/* YAPILANDIRMA */
const CONFIG = {
    owner: "okankaplanedu",
    repo: "okankaplanedu.github.io",
    branch: "main",
    baseFolder: "categories",
    cacheKey: "ok_academy_data",    // Kalıcı veri
    sessionKey: "ok_session_check", // Oturum kontrolü
    fetchDelay: 120
};

let masonryGrid;
let tempArchive = [];


function initMasonry() {
    masonryGrid = $('#masonry-container').masonry({
        itemSelector: '.grid-item',
        percentPosition: true,
        transitionDuration: '0.4s'
    });
}


function renderCard(article) {

    const cleanContent = article.content.replace(/<img/g, '<img loading="lazy" class="img-fluid"');
    
    const cardHTML = `
        <div class="grid-item">
            <div class="card-custom">
                <article>${cleanContent}</article>
                <a href="${article.url}" target="_top" class="btn-open">Detayları Gör →</a>
            </div>
        </div>`;
        
    const $item = $(cardHTML);
    $('#masonry-container').append($item);
    
    // Resimler yüklendikçe Masonry yerleşimini güncelle
    $item.imagesLoaded().progress(function() {
        masonryGrid.masonry('appended', $item).masonry('layout');
    });
}


async function scanAndCache(path) {
    try {
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`);
        if (!res.ok) return;
        const items = await res.json();

        for (const item of items) {
            if (item.type === "dir") {
                await scanAndCache(item.path);
            } else if (item.name === "index.html" && path !== CONFIG.baseFolder) {
                updateUIStatus(`Arşivleniyor: ${item.path.split('/').slice(-2,-1)}`);
                
                const contentRes = await fetch(`https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${item.path}`);
                if (contentRes.ok) {
                    const html = await contentRes.text();
                    const doc = new DOMParser().parseFromString(html, "text/html");
                    const article = doc.querySelector("main article");
                    if (article) {
                        const data = {
                            url: `https://${CONFIG.repo}/${item.path.replace('index.html','')}`,
                            content: article.innerHTML
                        };
                        tempArchive.push(data);
                        renderCard(data);
                    }
                }
                await new Promise(r => setTimeout(r, CONFIG.fetchDelay));
            }
        }
    } catch (e) { console.error("Tarama hatası:", e); }
}

function updateUIStatus(msg) {
    const txt = document.getElementById("status-message");
    if(txt) txt.innerText = msg;
}

function finalizeUI() {
    const spinner = document.getElementById("status-spinner");
    if (spinner) spinner.style.display = "none";
    const status = document.getElementById("status");
    if (status) {
        status.innerHTML = `<span style="color:#10b981">●</span> <span style="font-size:12px; font-weight:600; color:#666;">+</span>`;
    }
}


async function startApp() {
    initMasonry();
    
    const savedData = localStorage.getItem(CONFIG.cacheKey);
    const isSessionActive = sessionStorage.getItem(CONFIG.sessionKey);

    if (savedData && isSessionActive) {
        updateUIStatus("Önbellek yükleniyor...");
        const articles = JSON.parse(savedData);
        articles.forEach(art => renderCard(art));
        finalizeUI();
    } else {
     
        updateUIStatus("...");
        await scanAndCache(CONFIG.baseFolder);
        
        if (tempArchive.length > 0) {
            localStorage.setItem(CONFIG.cacheKey, JSON.stringify(tempArchive));
            sessionStorage.setItem(CONFIG.sessionKey, "active"); // Oturumu başlat
        }
        finalizeUI();
    }
}

$(document).ready(startApp);


fetch('https://raw.githubusercontent.com/bandanee/root/main/import/toc.html').then(r => r.text()).then(h => document.getElementById('toc-placeholder').innerHTML = h);
fetch('https://raw.githubusercontent.com/bandanee/root/main/import/footer.html').then(r => r.text()).then(h => document.getElementById('footer-placeholder').innerHTML = h);
</script>
